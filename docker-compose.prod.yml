version: '3.9'

services:
  # ==================== DATABASE ====================
  mysql:
    image: mysql:8.4
    container_name: pesquisa-mysql
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --log_bin_trust_function_creators=1
      - --max_connections=1000
      - --max_allowed_packet=256M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pesquisa_satisfacao}
      MYSQL_USER: ${MYSQL_USER:-pesquisa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secure_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_logs:/var/log/mysql
    networks:
      - pesquisa-network
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pesquisa-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      PORT: "3001"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${MYSQL_USER:-pesquisa}
      DB_PASS: ${MYSQL_PASSWORD:-secure_password}
      DB_NAME: ${MYSQL_DATABASE:-pesquisa_satisfacao}
      DB_LOGGING: ${DB_LOGGING:-false}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
    networks:
      - pesquisa-network
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pesquisa-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_APP_NAME: ${VITE_APP_NAME:-Pesquisa e Satisfação}
    networks:
      - pesquisa-network
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
    driver: local
  mysql_logs:
    driver: local

networks:
  pesquisa-network:
    driver: bridge
    external: true
