services:
  # ==================== DATABASE ====================
  mysql:
    image: mysql:8.4
    container_name: pesquisa-mysql-dev
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --log_bin_trust_function_creators=1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pesquisa_satisfacao
      MYSQL_USER: pesquisa
      MYSQL_PASSWORD: pesquisa
    volumes:
      - mysql_data_dev:/var/lib/mysql
    networks:
      - pesquisa-network-dev
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pesquisa-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: "3001"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: pesquisa
      DB_PASS: pesquisa
      DB_NAME: pesquisa_satisfacao
      DB_LOGGING: "true"
      JWT_SECRET: dev_secret_key_change_in_production
      JWT_EXPIRATION: "3600"
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGIN: "http://localhost:5173"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - pesquisa-network-dev
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s

volumes:
  mysql_data_dev:
    driver: local

networks:
  pesquisa-network-dev:
    driver: bridge
